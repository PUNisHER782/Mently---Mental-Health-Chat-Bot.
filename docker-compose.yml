version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mently-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mently
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mently-server
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/mently
      JWT_SECRET: dev_secret_key_change_in_production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: development
    volumes:
      - ./server/src:/app/src
    command: npm run dev

volumes:
  mongodb-data:

networks:
  default:
    name: mently-network
